name: Publish

on:
  push:
    branches:
      - master

env:
  REGISTRY: harbor.fractalems.com
  REPOSITORY: hmi-v2/mqtt-recorder

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: DockerArchiveSecrets
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Application Version
        id: version
        uses: iautom8things/semantic-version@v4.0.5
        with:
          change_path: ''
          short_tags: true
          bump_each_commit: false

      - name: Login to Harbor
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./DockerFile
          push: true
          tags: ${{ format('{0}/{1}:{2}', env.REGISTRY, env.REPOSITORY, steps.version.outputs.version_tag) }}
