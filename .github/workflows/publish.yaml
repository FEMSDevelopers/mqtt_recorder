name: Publish

on:
  push:
    branches:
      - 'main'

env:
  REGISTRY: harbor.fractalems.com
  REPOSITORY: hmi-v2/mqtt-recorder

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: DockerArchiveSecrets
    steps:
      - name: Code Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Application Version
        id: version
        uses: iautom8things/semantic-version@v4.0.5
        with:
          change_path: ''
          short_tags: true
          bump_each_commit: false
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: admin
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ format('{0}/{1}:{2}', env.REGISTRY, env.REPOSITORY, steps.version.outputs.version_tag) }}
          build-args: |
            GITHUB_TAG_VERSION=${{ steps.version.outputs.version }}
      - name: Create tag
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/${{ steps.version.outputs.version_tag }}',
              sha: context.sha
            })
